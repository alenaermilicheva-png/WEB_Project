{% extends "base.html" %}
{% block content %}
<h1 class="login">Добрые дела</h1>

{% if events %}
    {% for event in events %}
        <div class="card mb-3">
            <div class="card-body">
                <h4>{{ event.title }}</h4>
                <p>{{ event.description }}</p>
                <small>{{ event.city }} | {{ event.date }}</small>
            </div>
        </div>
    {% endfor %}
{% else %}
    <div class="alert alert-info">Пока нет событий</div>
{% endif %}

{% endblock %}
