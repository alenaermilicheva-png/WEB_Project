<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Волонтёрское бюро</title>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Волонтёрское бюро</a>
            <div>
                {% if current_user.is_authenticated %}
                    <a href="/profile" class="btn btn-outline-light">Профиль</a>
                    <a href="/logout" class="btn btn-light">Выйти</a>
                {% else %}
                    <a href="/login" class="btn btn-outline-light">Войти</a>
                    <a href="/register" class="btn btn-light">Регистрация</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container mt-4">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-info">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
